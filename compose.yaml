services:
  mysql:
    image: mysql:8.0
    container_name: corralon-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: corralon_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: